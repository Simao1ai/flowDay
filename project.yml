name: Flow Day-ios
options:
  bundleIdPrefix: io.flowday
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "6R2383P25H"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  FlowDay:
    type: application
    platform: iOS
    sources:
      - path: FlowDay
      - path: FlowDayWidgets/Shared
    dependencies:
      - package: GoogleSignIn
      - package: Supabase
      - target: FlowDayWidgets
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.flowday.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_VALUES: >-
          {
            "CFBundleDisplayName": "FlowDay",
            "CFBundleName": "FlowDay",
            "CFBundleShortVersionString": "1.0.0",
            "CFBundleVersion": "1",
            "UILaunchScreen": {},
            "UISupportedInterfaceOrientations": [
              "UIInterfaceOrientationPortrait",
              "UIInterfaceOrientationLandscapeLeft",
              "UIInterfaceOrientationLandscapeRight"
            ],
            "UISupportedInterfaceOrientations~ipad": [
              "UIInterfaceOrientationPortrait",
              "UIInterfaceOrientationPortraitUpsideDown",
              "UIInterfaceOrientationLandscapeLeft",
              "UIInterfaceOrientationLandscapeRight"
            ],
            "UIRequiresFullScreen": false,
            "NSSupportsLiveActivities": true,
            "NSCalendarsFullAccessUsageDescription": "FlowDay shows your calendar events alongside tasks in one daily timeline.",
            "NSSpeechRecognitionUsageDescription": "FlowDay uses voice recognition to capture tasks hands-free.",
            "NSMicrophoneUsageDescription": "FlowDay uses your microphone for voice task capture.",
            "NSUserActivityTypes": [
              "io.flowday.app.add-task",
              "io.flowday.app.complete-task",
              "io.flowday.app.plan-day"
            ]
          }
    entitlements:
      path: FlowDay/FlowDay.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.io.flowday.app

  FlowDayWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: FlowDayWidgets/Info.plist
      properties:
        CFBundleDisplayName: FlowDayWidgets
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: FlowDayWidgets/FlowDayWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.flowday.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.flowday.app.widgets
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
    sources:
      - path: FlowDayWidgets

  FlowDayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FlowDayTests
    dependencies:
      - target: FlowDay

schemes:
  Flow Day-ios:
    build:
      targets:
        FlowDay: all
        FlowDayWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FlowDayTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
